<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ESC-PR — Finished</title>

  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/fonts.css" />
  <link rel="stylesheet" href="css/grid.css" />
  <link rel="stylesheet" href="css/pages.css" />
  <link rel="stylesheet" href="css/components/button.css" />
</head>
<body>
  <main class="stage">
    <div class="region-finish-panel">
      <h1 class="finish-title">Message encrypted successfully.</h1>
      <p class="finish-text">
        You can now pass it on and let the recipient decrypt it with the
        ESC-PR Vector Decryption Client (mobile web app). The link is
        printed on your receipt.
      </p>
    </div>

    <div class="region-finish-action">
      <button class="btn" type="button" data-component="button" data-action="start-over">
        Start Over
      </button>
    </div>
  </main>

  <script type="module" src="js/main.js"></script>
  <script type="module" src="js/finish.js"></script>
</body>
</html>
