<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ESC-PR — Enter Message</title>

  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/fonts.css" />
  <link rel="stylesheet" href="css/grid.css" />
  <link rel="stylesheet" href="css/pages.css" />
  <link rel="stylesheet" href="css/components/button.css" />
</head>
<body>
  <main class="stage">
    <form id="create-form" style="display: contents;">
      <div class="region-entry-band">
        <textarea
          id="message-input"
          class="entry-input"
          name="message"
          rows="1"
          placeholder="ENTER MESSAGE"
          autocomplete="off"
          spellcheck="false"
          required
        ></textarea>
      </div>

      <div class="region-entry-counter">
        <div class="entry-counter">Remaining Words: <span id="words-left">10</span></div>
      </div>

      <div class="region-entry-create">
        <button class="btn" type="submit">Create</button>
      </div>
    </form>

    <div class="region-entry-back">
      <button class="btn" type="button" data-component="button" data-action="back">
        Back
      </button>
    </div>

    <div class="region-entry-text">
      <p class="entry-text">
        Enter the secret message you want to encode. The generator
        transforms each word into a new symbol. In the next step, you can
        customize the generated symbols before printing. A barcode is
        automatically generated and printed with your message. You can
        decode later by scanning it.
      </p>
    </div>
  </main>

  <script type="module" src="js/main.js"></script>
  <script type="module" src="js/entry.js"></script>
</body>
</html>
