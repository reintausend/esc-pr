name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5

      # Publish phone client + desktop station UI.
      # Keep relative import paths identical to the repo:
      #   mobile/  →  ../barcode_system/site/shared/
      #            →  ../gui/css/  +  ../gui/assets/fonts/
      #   gui/     →  ../generator/  +  ../barcode_system/site/shared/
      # Print server stays local — Print on Pages will fail without it.
      - name: Assemble site
        run: |
          set -euo pipefail
          mkdir -p _site

          cp -R mobile _site/mobile
          cp -R gui _site/gui
          cp -R generator _site/generator
          mkdir -p _site/barcode_system/site
          cp -R barcode_system/site/shared _site/barcode_system/site/shared
          cp pages-root/index.html _site/index.html

          # Drop bulky / unused paths that the browser never loads
          rm -rf _site/generator/Editor/tools/paperjs-v0/docs \
                 _site/generator/Editor/tools/paperjs-v0/examples \
                 _site/generator/Editor/tools/paperjs-v0/node_modules \
                 _site/gui/.DS_Store \
                 _site/generator/.DS_Store || true

          echo "Assembled site (top-level):"
          find _site -maxdepth 2 -type d | sort
          echo "File count: $(find _site -type f | wc -l)"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
