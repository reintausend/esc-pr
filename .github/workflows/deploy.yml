name: Deploy phone client to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5

      # Publish only what phones need. The terminal (gui HTML, generator,
      # epson print server) stays local on the installation computer.
      # Folder layout in the artifact mirrors the repo so mobile/'s
      # relative imports keep working:
      #   mobile/  →  ../barcode_system/site/shared/
      #            →  ../gui/css/  +  ../gui/assets/fonts/
      - name: Assemble phone-only site
        run: |
          set -euo pipefail
          mkdir -p _site/mobile
          mkdir -p _site/gui/css
          mkdir -p _site/gui/assets
          mkdir -p _site/barcode_system/site

          cp -R mobile/. _site/mobile/
          cp -R gui/css/. _site/gui/css/
          cp -R gui/assets/fonts _site/gui/assets/fonts
          cp -R barcode_system/site/shared _site/barcode_system/site/shared
          cp pages-root/index.html _site/index.html

          echo "Assembled site:"
          find _site -type f | sort | head -50

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
